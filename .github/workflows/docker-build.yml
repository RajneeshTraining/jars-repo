name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # This new step safely forces your username to lowercase for Docker
    - name: Handle Lowercase Username
      id: string
      run: |
        echo "uname=$(echo '${{ secrets.DOCKER_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Uses the safe, lowercase username from the step above
        tags: ${{ steps.string.outputs.uname }}/color-text:blue
